name: CJP Dashboard Update (Every 4 Hours)
on:
  schedule:
    - cron: '0 */4 * * *'   # runs at 00:00, 04:00, 08:00, 12:00, 16:00, 20:00 UTC
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download latest dashboard
        run: |
          curl -fsSL -v "${{ secrets.DASHBOARD_URL }}" -o cjp_dashboard.html
          echo "File size: $(wc -c < cjp_dashboard.html) bytes"

      - name: Commit and push if changed
        run: |
          git config user.name "CJP Bot"
          git config user.email "bot@cjp-dashboard"
          git add cjp_dashboard.html
          git diff --cached --quiet && echo "No changes" && exit 0
          git commit -m "chore: dashboard update $(date +'%Y-%m-%d %H:%M UTC')"
          git push
